services:
  redis:
    image: redis:latest
    container_name: ssv-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Placeholder for vector DB (activate in M7)
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: ssv-qdrant
  #   ports:
  #     - "${QDRANT_PORT:-6333}:6333"
  #   volumes:
  #     - qdrant-data:/qdrant/storage

volumes:
  redis-data:

networks:
  default:
    name: ssv-network
