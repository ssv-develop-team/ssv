name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify:
    name: Build and Test
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      SSV_RTSP_URL: ""
      SSV_REQUIRE_SMOKE: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            cmake \
            curl \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-tools \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev \
            libhiredis-dev \
            libyaml-cpp-dev \
            meson \
            ninja-build \
            nlohmann-json3-dev \
            pkg-config \
            python3-venv \
            tar \
            util-linux

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Check shell syntax
        run: bash -n ssv scripts/*.sh tests/*.sh

      - name: Run test suite
        run: ./ssv test
